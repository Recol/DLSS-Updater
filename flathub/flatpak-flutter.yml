# flatpak-flutter input manifest. Regenerate the offline manifest with:
#   flatpak-flutter.py --app-module flet-client --app-pubspec client flatpak-flutter.yml
id: io.github.recol.dlss_updater
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20
command: dlss-updater
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network
  # scans and patches DLLs inside user game libraries across drives
  - --filesystem=home
  - --filesystem=/mnt
  - --filesystem=/media
  - --filesystem=/run/media
  - --env=PYTHON_GIL=0
modules:
  - modules/cpython.json

  - generated/python-deps.json

  # flet UI client, built from source; trimmed to core (the app uses no flet
  # extensions - this also drops plugins that ship or fetch prebuilt binaries)
  - name: flet-client
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/llvm20/bin:/var/lib/flutter/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
      env:
        PUB_CACHE: /run/build/flet-client/.pub-cache
    build-commands:
      - cd client && flutter build linux --release --no-pub
      - mkdir -p /app/share/flet-client
      - cp -r client/build/linux/x64/release/bundle/* /app/share/flet-client/
    sources:
      - type: git
        url: https://github.com/flet-dev/flet.git
        tag: v0.85.3
      - type: patch
        path: patches/flet-client-trim.patch
      - type: git
        url: https://github.com/flutter/flutter.git
        tag: 3.44.6
        dest: flutter

  - name: dlss-updater
    buildsystem: simple
    build-commands:
      - |
        SITE=$(/app/bin/python3.14t -c 'import sysconfig; print(sysconfig.get_paths()["purelib"])')
        cp -r dlss_updater "$SITE/"
      - mkdir -p /app/share/dlss-updater
      - cp main.py /app/share/dlss-updater/main.py
      - install -Dm755 launcher.sh /app/bin/dlss-updater
      - install -Dm644 io.github.recol.dlss_updater.metainfo.xml /app/share/metainfo/io.github.recol.dlss_updater.metainfo.xml
      - install -Dm644 flatpak/io.github.recol.dlss_updater.desktop /app/share/applications/io.github.recol.dlss_updater.desktop
      - install -Dm644 appimagex_png.png /app/share/icons/hicolor/256x256/apps/io.github.recol.dlss_updater.png
    sources:
      - type: git
        url: https://github.com/Recol/DLSS-Updater.git
        commit: 061843cbfdfbe2481d467a817e3e3971beca7b94
      - type: file
        path: launcher.sh
