# Fast-iteration manifest used by build_flathub.sh: host-built flet client +
# local checkout. The submission path is flatpak-flutter.yml.
id: io.github.recol.dlss_updater
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: dlss-updater
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network
  # scans and patches DLLs inside user game libraries across drives
  - --filesystem=home
  - --filesystem=/mnt
  - --filesystem=/media
  - --filesystem=/run/media
  - --env=PYTHON_GIL=0
modules:
  # the app requires free-threaded (no-GIL) Python 3.14
  - name: cpython-freethreaded
    buildsystem: autotools
    config-opts:
      - --disable-gil
      - --with-ensurepip=install
      - --without-static-libpython
    build-options:
      no-debuginfo: true
    sources:
      - type: archive
        url: https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tar.xz
        sha256: a97d5549e9ad81fe17159ed02c68774ad5d266c72f8d9a0b5a9c371fe85d902b

  - generated/python-deps.json

  - name: flet-client
    buildsystem: simple
    build-commands:
      - mkdir -p /app/share/flet-client
      - cp -r bundle-src/* /app/share/flet-client/
    sources:
      - type: dir
        path: client-build/bundle
        dest: bundle-src

  - name: dlss-updater
    buildsystem: simple
    build-commands:
      - |
        SITE=$(/app/bin/python3.14t -c 'import sysconfig; print(sysconfig.get_paths()["purelib"])')
        cp -r dlss_updater "$SITE/"
      - mkdir -p /app/share/dlss-updater
      - cp main.py /app/share/dlss-updater/main.py
      - install -Dm755 launcher.sh /app/bin/dlss-updater
      - install -Dm644 io.github.recol.dlss_updater.metainfo.xml /app/share/metainfo/io.github.recol.dlss_updater.metainfo.xml
      - install -Dm644 flatpak/io.github.recol.dlss_updater.desktop /app/share/applications/io.github.recol.dlss_updater.desktop
      - install -Dm644 appimagex_png.png /app/share/icons/hicolor/256x256/apps/io.github.recol.dlss_updater.png
    sources:
      - type: dir
        path: ..
      - type: file
        path: launcher.sh
