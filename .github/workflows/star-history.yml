name: Star History

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Renders the star-history chart in CI and commits a static SVG, since
      # GitHub's 2026-06-30 stargazers API restriction broke star-history.com's
      # hosted chart endpoints. Since 2026-07-13 the stargazers API also
      # rejects the built-in Actions GITHUB_TOKEN (403 disguised as a rate
      # limit), so the render step needs a user PAT (STAR_HISTORY_TOKEN,
      # read-only/public_repo); the fallback keeps forks from hard-failing.
      - uses: narayann7/star-history-action@c2061675dacbf6f35d116e556015b8905843387f # v1.0.4
        with:
          repos: ${{ github.repository }}
          token: ${{ secrets.STAR_HISTORY_TOKEN || secrets.GH_PAT || github.token }}
