name: Build MSI Installer

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up uv with Python 3.14 free-threaded
      uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.14t"
        enable-cache: true
        cache-dependency-glob: "**/uv.lock"

    - name: Install dependencies
      run: uv sync --frozen --extra build

    - name: Clean build and dist directories
      run: |
        if (Test-Path build) { Remove-Item -Recurse -Force build }
        if (Test-Path dist) { Remove-Item -Recurse -Force dist }
      shell: pwsh

    - name: Build with PyInstaller
      run: uv run pyinstaller DLSS_Updater_MSI.spec --noconfirm

    - name: Package MSI with Briefcase
      run: uv run briefcase package windows --no-input
      shell: pwsh

    - name: Get version and prepare MSI
      id: msi_info
      run: |
        # Get version from release tag or latest release
        if ("${{ github.event_name }}" -eq "release") {
          $version = "${{ github.event.release.tag_name }}" -replace '^[vV]', ''
          $tag = "${{ github.event.release.tag_name }}"
        } else {
          $headers = @{
            "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}"
            "Accept" = "application/vnd.github.v3+json"
          }
          $latest_release = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/latest" -Headers $headers
          $version = $latest_release.tag_name -replace '^[vV]', ''
          $tag = $latest_release.tag_name
        }
        echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        echo "TAG=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

        # Find the MSI file in dist/
        $msiFile = Get-ChildItem -Path dist -Filter "*.msi" -Recurse | Select-Object -First 1
        if (-not $msiFile) {
          Write-Error "No MSI file found in dist/"
          exit 1
        }
        Write-Host "Found MSI: $($msiFile.FullName)"

        # Rename to consistent naming convention
        $newName = "DLSS.Updater.$version.msi"
        $newPath = Join-Path "dist" $newName
        Move-Item -Path $msiFile.FullName -Destination $newPath -Force
        Write-Host "Renamed to: $newPath"
        echo "MSI_PATH=$newPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        echo "MSI_NAME=$newName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      shell: pwsh

    - name: Generate SHA256 hash
      id: hash
      run: |
        $hash = (Get-FileHash "${{ steps.msi_info.outputs.MSI_PATH }}" -Algorithm SHA256).Hash
        Write-Host "SHA256: $hash"
        echo "MSI_HASH=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      shell: pwsh

    - name: Remove stale MSI assets from release
      run: |
        # Remove any existing .msi assets to avoid duplicates with different naming
        $assets = gh release view "${{ steps.msi_info.outputs.TAG }}" --json assets --jq '.assets[].name' 2>$null
        foreach ($asset in $assets) {
          if ($asset -like "*.msi") {
            Write-Host "Removing stale asset: $asset"
            gh release delete-asset "${{ steps.msi_info.outputs.TAG }}" "$asset" --yes
          }
        }
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: pwsh

    - name: Upload MSI to release
      run: |
        gh release upload "${{ steps.msi_info.outputs.TAG }}" "${{ steps.msi_info.outputs.MSI_PATH }}" --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: pwsh
