name: Chocolatey Release

permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Get latest release version and MSI hash
      id: get_version
      run: |
        $latest_release = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/latest" -Headers @{ "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}" }
        $version = $latest_release.tag_name -replace '^[vV]', ''
        echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

        # Download MSI only to compute hash
        $msiUrl = "https://github.com/${{ github.repository }}/releases/download/$($latest_release.tag_name)/DLSS.Updater.$version.msi"
        $tempMsi = Join-Path $env:TEMP "DLSS.Updater.msi"
        Invoke-WebRequest -Uri $msiUrl -OutFile $tempMsi
        $hash = (Get-FileHash $tempMsi -Algorithm SHA256).Hash
        echo "FILE_HASH=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        Remove-Item $tempMsi -Force
      shell: pwsh

    - name: Write CHECKSUM file
      run: |
        Set-Content -Path "tools\CHECKSUM" -Value "${{ steps.get_version.outputs.FILE_HASH }}" -NoNewline
      shell: pwsh

    - name: Update VERIFICATION.txt
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        $content = Get-Content -Path VERIFICATION.txt -Raw
        $content = $content -replace 'path\\to\\DLSS_Updater\.msi', 'DLSS_Updater.msi'
        $content += "`n`nChecksum (SHA256) for DLSS.Updater.$version.msi: ${{ steps.get_version.outputs.FILE_HASH }}"
        $content += "`nDownload URL: https://github.com/${{ github.repository }}/releases/download/V$version/DLSS.Updater.$version.msi"
        $content | Set-Content -Path VERIFICATION.txt
      shell: pwsh

    - name: Create Chocolatey package
      run: |
        choco pack DLSS-Updater.nuspec --version=${{ steps.get_version.outputs.VERSION }}
      shell: pwsh

    - name: Push to Chocolatey
      env:
        CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
      run: |
        choco apikey --key $env:CHOCO_API_KEY --source https://push.chocolatey.org/
        choco push dlss-updater.${{ steps.get_version.outputs.VERSION }}.nupkg --source https://push.chocolatey.org/ --force
      shell: pwsh
